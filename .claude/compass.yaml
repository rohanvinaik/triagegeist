      Target is ordinal 1-5 ESI scale with class imbalance (ESI 1=4%, ESI 3=36%).'
    depth: 2
  solution:
    name: solution
    claims:
    - text: 'Multi-scale approach ported from NCEMS: (1) Deterministic clinical rules
        first (NEWS2 thresholds, vital sign cutoffs for ESI classification), (2) Feature
        engineering with domain knowledge (shock index, clinical flags, complaint×history
        interactions), (3) Gradient boosting ensemble (CatBoost primary) on structured
        features, (4) Chief complaint text processing (lexicon mapping + embeddings),
        (5) Optional LLM residual for ambiguous cases. This beats generic ML because
        clinical domain knowledge encodes ESI decision rules directly.'
      source: interview:solution
      heading: Why this approach over alternatives?
      confidence: 0.9
      provenance: interviewed
      origin_facet: ''
    - text: 'Tradeoffs: (1) Prioritize structured features over NLP — NEWS2 alone
        explains 81.5% of variance. Chief complaint text is additive signal, not primary.
        (2) CatBoost over neural networks — tabular data favors gradient boosting.
        (3) Deterministic rules + ML hybrid over pure ML — clinical rules catch edge
        cases (e.g., GCS<8 = ESI 1 regardless of other features). (4) Speed over complexity
        — planned as 1-day blitz given NCEMS pipeline exists.'
      source: interview:solution
      heading: What tradeoffs were made?
      confidence: 0.9
      provenance: interviewed
      origin_facet: ''
    - text: 'NCEMS competition pipeline (multi-scale deterministic extraction + LLM
        residual) which achieved 66% outperformance over leaderboard. Clinical lexicon
        from Computational Semantics paper Section 9.5.2. Public notebook analysis
        shows competitors using CatBoost, XGBoost, LightGBM ensembles with BioBERT
        embeddings for text. Key differentiator: our clinical domain knowledge + systematic
        feature engineering vs generic autoML approaches.'
      source: interview:solution
      heading: What prior work inspired this?
      confidence: 0.9
      provenance: interviewed
      origin_facet: ''
    summary: 'Multi-scale approach ported from NCEMS: (1) Deterministic clinical rules
