  problem:
    name: problem
    claims:
    - text: 'Predict Emergency Severity Index (ESI) triage acuity levels 1-5 for emergency
        department patients. This is a Kaggle competition (Triagegeist, $10K prize,
        27 teams, deadline April 21 2026). The input is structured tabular data: 80K
        train / 20K test patients with vitals (BP, HR, RR, temp, SpO2, GCS, pain score,
        NEWS2 score), demographics (age, sex, language, insurance), arrival info (mode,
        time, origin), chief complaint text, and 25 binary medical history flags.
        Train includes 2 leakage columns (disposition, ed_los_hours) that must be
        excluded. Target is ordinal 1-5 ESI scale with class imbalance (ESI 1=4%,
        ESI 3=36%).'
      source: interview:problem
      heading: What specific problem does this solve?
      confidence: 0.9
      provenance: interviewed
      origin_facet: ''
    - text: 'Non-goals: (1) Building a production clinical decision support system
        — this is a competition entry. (2) Using leakage columns (disposition, ed_los_hours)
        which are post-triage outcomes. (3) Heavy NLP — chief_complaint_raw is helpful
        but NEWS2 (r=0.815) and vitals dominate the signal. (4) Synthetic data generation
        — real competition data is provided despite NOTE.md suggesting otherwise.'
      source: interview:problem
      heading: What are the non-goals?
      confidence: 0.9
      provenance: interviewed
      origin_facet: ''
    - text: Success = top 3 finish among 27 teams. Leaderboard is currently EMPTY
        (zero submissions). Evaluation metric needs confirmation but likely macro
        F1 or weighted F1 given ordinal multiclass nature. CV accuracy of ~97% is
        achievable per public notebooks (CatBoost + feature engineering). The real
        test is generalization to the held-out test set.
      source: interview:problem
      heading: What does success look like?
      confidence: 0.9
      provenance: interviewed
      origin_facet: ''
    summary: 'Predict Emergency Severity Index (ESI) triage acuity levels 1-5 for
      emergency department patients. This is a Kaggle competition (Triagegeist, $10K
      prize, 27 teams, deadline April 21 2026). The input is structured tabular data:
      80K train / 20K test patients with vitals (BP, HR, RR, temp, SpO2, GCS, pain
